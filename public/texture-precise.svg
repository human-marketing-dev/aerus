<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid slice">
  <title>Precise — grid of intersecting strokes</title>
  <defs>
    <pattern id="precise" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 30 30 M 0 30 L 30 30" fill="none" stroke="currentColor" stroke-width="1"></path>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#precise)"></rect>
</svg>
