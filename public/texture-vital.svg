<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid slice">
  <title>Vital — diagonal slashes with rhythmic spacing</title>
  <defs>
    <pattern id="vital" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <line x1="0" y1="6" x2="14" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></line>
      <line x1="0" y1="18" x2="10" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round"></line>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#vital)"></rect>
</svg>
